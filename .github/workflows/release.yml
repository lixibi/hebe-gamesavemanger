name: build-and-release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  actions: read
  contents: write
  packages: write

jobs:
  windows-client:
    name: Windows x64 client
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Enable pnpm
        run: corepack enable
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
      - name: Build Windows x64 client
        run: ~/go/bin/wails build -platform windows/amd64 -clean
      - name: Upload Windows client artifact
        uses: actions/upload-artifact@v4
        with:
          name: hebe-game-save-sync-windows-x64
          path: build/bin/hebe-game-save-sync.exe

  linux-server:
    name: Linux x64 server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
      - name: Build Linux x64 server
        run: |
          mkdir -p build/bin
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o build/bin/hebe-save-server-linux-x64 ./cmd/save-server
      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: hebe-save-server-linux-x64
          path: build/bin/hebe-save-server-linux-x64

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/hebe-save-server
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=sha-
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.save-server
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  github-release:
    name: GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - windows-client
      - linux-server
      - docker
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Prepare release files
        run: |
          mkdir -p release
          cp dist/hebe-game-save-sync-windows-x64/hebe-game-save-sync.exe release/hebe-game-save-sync-windows-x64.exe
          cp dist/hebe-save-server-linux-x64/hebe-save-server-linux-x64 release/hebe-save-server-linux-x64
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
